<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6d52e8"/>
    </linearGradient>
  </defs>
  <!-- Shield body -->
  <path d="M256 28 L462 120 C462 120 472 320 256 484 C40 320 50 120 50 120 Z" fill="url(#shieldGrad)" stroke="#4c32b0" stroke-width="8" stroke-linejoin="round"/>
  <!-- Inner shield highlight -->
  <path d="M256 68 L422 144 C422 144 430 306 256 442 C82 306 90 144 90 144 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4" stroke-linejoin="round"/>
  <!-- Gear + Lock centered in shield (scale 1.05 = +5%) -->
  <g transform="translate(256, 247) scale(1.25)" fill="rgba(255,255,255,0.95)">
    <!-- Gear outline with 8 smooth teeth -->
    <path d="
      M-12,-80 L12,-80 L16,-64 C22,-62 28,-58 33,-54 L48,-60 L62,-46 L56,-31 C60,-26 62,-20 64,-14 L80,-10 L80,12 L64,16 C62,22 60,28 56,33 L62,48 L48,62 L33,56 C28,60 22,62 16,64 L12,80 L-12,80 L-16,64 C-22,62 -28,60 -33,56 L-48,62 L-62,48 L-56,33 C-60,28 -62,22 -64,16 L-80,12 L-80,-10 L-64,-14 C-62,-20 -60,-26 -56,-31 L-62,-46 L-48,-60 L-33,-54 C-28,-58 -22,-62 -16,-64 Z
    "/>
    <!-- Gear center cutout -->
    <circle cx="0" cy="0" r="44" fill="#6d52e8"/>
    <!-- Lock body -->
    <rect x="-22" y="-3" width="44" height="34" rx="5" fill="rgba(255,255,255,0.95)"/>
    <!-- Lock shackle -->
    <path d="M-13,-3 V-17 C-13,-29 -7,-35 0,-35 C7,-35 13,-29 13,-17 V-3" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="8" stroke-linecap="round"/>
    <!-- Keyhole circle -->
    <circle cx="0" cy="13" r="7" fill="#6d52e8"/>
    <!-- Keyhole slot -->
    <rect x="-2.5" y="17" width="5" height="9" rx="1.5" fill="#6d52e8"/>
  </g>
</svg>
